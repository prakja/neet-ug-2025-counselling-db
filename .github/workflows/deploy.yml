name: Build and Deploy to ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: neet-counselling-dev
  ECS_SERVICE: neet-counselling-dev
  ECS_CLUSTER: np-pgrest
  ECS_TASK_DEFINITION: neet-counselling-dev
  CONTAINER_NAME: counselling

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push ARM64 image to ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          provenance: false

      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_DEFINITION }} \
            --query taskDefinition \
            --output json > task-definition.json

      - name: Inject secrets into task definition
        run: |
          python3 << 'EOF'
          import json, sys

          with open('task-definition.json', 'r') as f:
              td = json.load(f)

          # Find the counselling container
          for container in td['containerDefinitions']:
              if container['name'] == '${{ env.CONTAINER_NAME }}':
                  # Get existing env vars as dict for easy merge
                  env_map = {e['name']: e['value'] for e in container.get('environment', [])}

                  # Add/overwrite with secrets from GitHub Actions
                  env_map['DB_PASSWORD'] = '${{ secrets.DB_PASSWORD }}'
                  env_map['COUNSELLING_BOT_TOKEN'] = '${{ secrets.COUNSELLING_BOT_TOKEN }}'

                  # Convert back to list format
                  container['environment'] = [{'name': k, 'value': v} for k, v in env_map.items()]
                  break

          # Remove fields that cannot be updated in a new task definition revision
          for key in ['taskDefinitionArn', 'revision', 'status', 'requiresAttributes',
                      'placementConstraints', 'compatibilities', 'registeredAt', 'registeredBy']:
              td.pop(key, None)

          with open('task-definition.json', 'w') as f:
              json.dump(td, f, indent=2)

          print("Updated task definition with secrets")
          EOF

      - name: Update task definition with new image
        id: update-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.update-task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Cleanup task definition file
        run: rm -f task-definition.json
